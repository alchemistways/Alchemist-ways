name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -R .output/public/. _site/
          # SPA shell is emitted as _shell.html — Pages needs index.html
          if [ -f _site/_shell.html ]; then
            cp _site/_shell.html _site/index.html
          fi
          # Keep custom domain + disable Jekyll (repo README was being served as the site)
          cp CNAME _site/CNAME
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
